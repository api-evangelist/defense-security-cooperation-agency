aid: defense-security-cooperation-agency
name: Defense Security Cooperation Agency
description: >-
  The Defense Security Cooperation Agency (DSCA) is the U.S. Department of
  Defense agency that leads, directs, and manages security cooperation
  programs and resources to support U.S. policy and interests with foreign
  partners. DSCA administers the Foreign Military Sales (FMS) program,
  Foreign Military Financing (FMF) execution, International Military
  Education and Training (IMET), and humanitarian assistance programs.
  Public-facing surfaces include the Major Arms Sales notifications
  published in cooperation with Congress, the DSCA newsroom and library,
  and the Security Cooperation Workforce certification portal. DSCA does
  not publish a general-purpose developer API; partner-nation systems
  interact through controlled, government-to-government channels such as
  the Security Cooperation Information Portal (SCIP).
