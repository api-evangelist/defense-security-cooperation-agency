apis:
  - aid: defense-security-cooperation-agency:defense-security-cooperation-agency-website
    name: DSCA Website
    description: >-
      Public-facing website of the Defense Security Cooperation Agency that
      describes its mission, leadership, programs, and partners. The site
      links to news, the security cooperation library, and the FMS program
      but does not expose a developer API.
    humanURL: https://www.dsca.mil
    tags:
      - Federal Government
      - Website
    properties:
      - type: Documentation
        url: https://www.dsca.mil
  - aid: defense-security-cooperation-agency:defense-security-cooperation-agency-major-arms-sales
    name: DSCA Major Arms Sales Notifications
    description: >-
      DSCA publishes Major Arms Sales notifications and supporting
      transmittal documents that Congress and the public use to track
      potential Foreign Military Sales cases. Notifications are posted as
      web pages and PDFs without a documented API.
    humanURL: https://www.dsca.mil/press-media/major-arms-sales
    tags:
      - Arms Sales
      - FMS
      - Notifications
    properties:
      - type: Documentation
        url: https://www.dsca.mil/press-media/major-arms-sales
  - aid: defense-security-cooperation-agency:defense-security-cooperation-agency-scip
    name: Security Cooperation Information Portal (SCIP)
    description: >-
      Government-to-government portal that hosts case management,
      financial, and logistical information for security cooperation
      partners. SCIP requires authenticated access and operates outside
      the public developer ecosystem.
    humanURL: https://www.dsca.mil/policy/dsca-policy-systems/security-cooperation-information-portal-scip
    tags:
      - Case Management
      - Foreign Military Sales
      - Partner Nation
    properties:
      - type: Documentation
        url: https://www.dsca.mil/policy/dsca-policy-systems/security-cooperation-information-portal-scip
  - aid: defense-security-cooperation-agency:defense-security-cooperation-agency-workforce
    name: DSCA Security Cooperation Workforce Development
    description: >-
      DSCA portal supporting Security Cooperation Workforce certification,
      training, and the Defense Security Cooperation University (DSCU).
      Public information is available on the website with authenticated
      systems for enrolled professionals.
    humanURL: https://www.dscu.edu
    tags:
      - Certification
      - Training
      - Workforce
    properties:
      - type: Documentation
        url: https://www.dscu.edu
